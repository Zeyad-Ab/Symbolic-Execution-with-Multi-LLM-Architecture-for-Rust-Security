# Rust Vulnerability Analyzer Configuration
analysis:
  # Analysis profiles
  profiles:
    quick:
      klee_timeout: 30
      klee_max_tests: 500
      fuzz_timeout: 15
      fuzz_executions: 2
      risk_threshold: "MEDIUM"
    
    standard:
      klee_timeout: 60
      klee_max_tests: 1000
      fuzz_timeout: 30
      fuzz_executions: 4
      risk_threshold: "LOW"
    
    thorough:
      klee_timeout: 120
      klee_max_tests: 2000
      fuzz_timeout: 60
      fuzz_executions: 8
      risk_threshold: "LOW"

  # Vulnerability patterns to detect
  vulnerability_patterns:
    - "buffer_overflow"
    - "integer_overflow"
    - "use_after_free"
    - "null_pointer_dereference"
    - "path_traversal"
    - "sql_injection"
    - "weak_crypto"
    - "unsafe_pointer_operations"

  # File patterns to analyze
  file_patterns:
    - "*.rs"
    - "src/**/*.rs"
    - "examples/**/*.rs"
    - "tests/**/*.rs"

  # Exclude patterns
  exclude_patterns:
    - "target/**"
    - "**/target/**"
    - "**/node_modules/**"

# LLM Configuration
llm:
  model: "gpt-4o-mini"
  max_tokens: 2048
  temperature: 0.0
  retry_attempts: 3
  retry_delay: 2

# Output Configuration
output:
  format: "json"  # json, html, sarif
  include_source: true
  include_timestamps: true
  save_intermediate: false

# Performance Configuration
performance:
  max_parallel_files: 2
  enable_caching: true
  cache_ttl: 3600  # 1 hour in seconds
  cleanup_after: true
